<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBK저축은행 대출 추천기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <style>
    body { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f7fa; }
    .chip { cursor: pointer; transition: all 0.15s; user-select: none; color: #334155; }
    .chip.active { background: #1D4ED8; color: #fff; border-color: #1D4ED8; }
    .chip:not(.active):hover { background: #EFF6FF; border-color: #93C5FD; }
    .tab-btn { cursor: pointer; transition: all 0.15s; user-select: none; color: #475569; }
    .tab-btn.active { background: #1D4ED8; color: #fff; border-color: #1D4ED8; }
    .tab-btn:not(.active):hover { background: #EFF6FF; border-color: #93C5FD; }
    .product-card { transition: box-shadow 0.15s; }
    .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    select { appearance: auto; }
    .badge-best { background: #1D4ED8; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #EFF6FF; color: #1D4ED8; font-weight: 500; }
    .tag.green { background: #F0FDF4; color: #15803D; }
    .tag.amber { background: #FFFBEB; color: #B45309; }
    @media (max-width: 600px) {
      .grid-2 { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body class="min-h-screen py-8 px-4">

  <div style="max-width: 720px; margin: 0 auto;">

    <!-- 헤더 -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-1">
        <img src="https://www.ibksb.co.kr/img/logo.png" alt="IBK저축은행" style="height:28px;" onerror="this.style.display='none'">
        <h1 style="font-size:22px; font-weight:700; color:#1e293b;">대출 상품 추천기</h1>
      </div>
      <p style="font-size:14px; color:#64748b;">조건을 선택하면 IBK저축은행 맞춤 상품을 추천해 드려요</p>
    </div>

    <!-- 메뉴 탭 -->
    <div style="display:flex; gap:8px; margin-bottom:1.5rem;" id="view-tabs">
      <span class="tab-btn active" data-view="recommend" style="flex:1; text-align:center; padding:10px 14px; border-radius:10px; border:1px solid #CBD5E1; font-size:14px; font-weight:600;">맞춤 추천</span>
      <span class="tab-btn" data-view="catalog" style="flex:1; text-align:center; padding:10px 14px; border-radius:10px; border:1px solid #CBD5E1; font-size:14px; font-weight:600;">전체 상품 보기</span>
    </div>

    <!-- 맞춤 추천 화면 -->
    <div id="recommend-view">

      <!-- 입력 폼 -->
      <div style="background:#fff; border-radius:16px; border:1px solid #e2e8f0; padding:1.5rem; margin-bottom:1.5rem;">

        <!-- 직업 유형 -->
        <div class="mb-5">
          <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:8px;">
            <i class="ti ti-briefcase" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>직업 유형
          </label>
          <div style="display:flex; flex-wrap:wrap; gap:8px;" id="job-group">
            <span class="chip" data-val="전체" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">전체</span>
            <span class="chip active" data-val="직장인" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">직장인</span>
            <span class="chip" data-val="자영업자" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">자영업자 / 소상공인</span>
            <span class="chip" data-val="의료사업자" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">의료사업자</span>
            <span class="chip" data-val="법인" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">법인사업자</span>
          </div>
        </div>

        <!-- 신용 등급 -->
        <div class="mb-5">
          <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:8px;">
            <i class="ti ti-star" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>신용 등급
          </label>
          <div style="display:flex; flex-wrap:wrap; gap:8px;" id="credit-group">
            <span class="chip" data-val="전체" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">전체</span>
            <span class="chip" data-val="고신용" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">고신용 (1~3등급)</span>
            <span class="chip active" data-val="중신용" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">중신용 (4~6등급)</span>
            <span class="chip" data-val="저신용" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">저신용 (7등급 이하)</span>
          </div>
        </div>

        <!-- 대출 목적 -->
        <div class="mb-5">
          <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:8px;">
            <i class="ti ti-target" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>대출 목적
          </label>
          <div style="display:flex; flex-wrap:wrap; gap:8px;" id="purpose-group">
            <span class="chip" data-val="전체" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">전체</span>
            <span class="chip active" data-val="생활자금" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">생활자금</span>
            <span class="chip" data-val="사업자금" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">사업자금</span>
            <span class="chip" data-val="부동산" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">부동산 / 담보</span>
            <span class="chip" data-val="경매" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">경락잔금</span>
          </div>
        </div>

        <!-- 금액 + 담보 -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;" class="grid-2">
          <div>
            <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">
              <i class="ti ti-cash" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>필요 금액 (만원)
            </label>
            <input type="number" id="amount" value="1000" min="100" max="100000" step="100"
              style="width:100%; padding:8px 12px; border:1px solid #CBD5E1; border-radius:8px; font-size:14px; color:#1e293b; outline:none;"
              onfocus="this.style.borderColor='#3B82F6'" onblur="this.style.borderColor='#CBD5E1'" />
          </div>
          <div>
            <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px;">
              <i class="ti ti-building-bank" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>담보 여부
            </label>
            <select id="collateral"
              style="width:100%; padding:8px 12px; border:1px solid #CBD5E1; border-radius:8px; font-size:14px; color:#1e293b; background:#fff; outline:none;">
              <option value="전체">전체</option>
              <option value="없음">없음 (신용 / 보증)</option>
              <option value="부동산">부동산 담보 있음</option>
              <option value="예적금">예·적금 담보 있음</option>
            </select>
          </div>
        </div>

        <!-- 지역 -->
        <div class="mb-5">
          <label style="display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:8px;">
            <i class="ti ti-map-pin" style="font-size:15px; vertical-align:-2px; margin-right:4px;"></i>거주 / 사업 지역
          </label>
          <div style="display:flex; flex-wrap:wrap; gap:8px;" id="region-group">
            <span class="chip active" data-val="전국" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">전국</span>
            <span class="chip" data-val="부산경남" style="padding:6px 14px; border-radius:20px; border:1px solid #CBD5E1; font-size:13px;">부산 / 울산 / 경남</span>
          </div>
        </div>

        <!-- 추천 버튼 -->
        <button onclick="recommend()"
          style="width:100%; padding:13px; background:#1D4ED8; color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:0.3px;"
          onmouseover="this.style.background='#1E40AF'" onmouseout="this.style.background='#1D4ED8'">
          대출 상품 추천받기
        </button>
      </div>

      <!-- 결과 영역 -->
      <div id="results"></div>
    </div>

    <!-- 전체 상품 보기 화면 -->
    <div id="catalog-view" style="display:none;">
      <div id="catalog-results"></div>
    </div>

  </div>

  <script>
    function setupChipGroup(groupId) {
      const group = document.getElementById(groupId);
      group.addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    }
    ['job-group', 'credit-group', 'purpose-group', 'region-group'].forEach(setupChipGroup);

    function getActiveChip(groupId) {
      return document.querySelector(`#${groupId} .chip.active`)?.dataset.val;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderProductCard(p) {
      return `
        <div class="product-card" style="background:#fff; border-radius:14px; border:1px solid #e2e8f0; padding:1.25rem; margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px;">
            <div style="display:flex; align-items:center; gap:6px;">
              <span style="font-size:15px; font-weight:700; color:#1e293b;">${escapeHtml(p.name)}</span>
              ${p.best ? '<span class="badge-best">BEST</span>' : ''}
            </div>
            <a href="${escapeHtml(p.url)}" target="_blank" rel="noopener noreferrer"
               style="font-size:12px; color:#1D4ED8; font-weight:600; white-space:nowrap;">
              자세히 보기 <i class="ti ti-external-link" style="font-size:12px;"></i>
            </a>
          </div>
          <p style="font-size:13px; color:#64748b; margin-bottom:10px;">${escapeHtml(p.description)}</p>
          <div style="display:flex; gap:16px; margin-bottom:10px; font-size:13px;">
            <div><span style="color:#94a3b8;">금리</span> <span style="font-weight:600; color:#1e293b;">${escapeHtml(p.rate_display)}</span></div>
            <div><span style="color:#94a3b8;">한도</span> <span style="font-weight:600; color:#1e293b;">${escapeHtml(p.limit_display)}</span></div>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:6px;">
            ${p.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
      `;
    }

    function renderResults(data) {
      const el = document.getElementById('results');

      if (data.count === 0) {
        el.innerHTML = `
          <div style="background:#fff; border-radius:16px; border:1px solid #e2e8f0; padding:2rem; text-align:center; color:#64748b; font-size:14px;">
            <i class="ti ti-mood-empty" style="font-size:28px; display:block; margin-bottom:8px; color:#94a3b8;"></i>
            조건에 맞는 상품이 없어요. 조건을 조정해 다시 시도해 보세요.
          </div>`;
        return;
      }

      const cards = data.results.map(renderProductCard).join('');

      el.innerHTML = `
        <div style="font-size:13px; color:#64748b; margin-bottom:10px; padding-left:2px;">
          총 <strong style="color:#1e293b;">${data.count}개</strong> 상품이 조건에 맞아요
        </div>
        ${cards}
      `;
    }

    async function recommend() {
      const job = getActiveChip('job-group');
      const credit = getActiveChip('credit-group');
      const purpose = getActiveChip('purpose-group');
      const region = getActiveChip('region-group');
      const collateral = document.getElementById('collateral').value;
      const amount = document.getElementById('amount').value;

      const el = document.getElementById('results');
      el.innerHTML = `<div style="text-align:center; padding:2rem; color:#94a3b8; font-size:14px;">추천 상품을 찾는 중...</div>`;

      const params = new URLSearchParams({ job, credit, purpose, region, collateral, amount });

      try {
        const res = await fetch(`/api/recommend?${params.toString()}`);
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        el.innerHTML = `
          <div style="background:#fff; border-radius:16px; border:1px solid #FCA5A5; padding:1.5rem; text-align:center; color:#B91C1C; font-size:14px;">
            추천 결과를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.
          </div>`;
        console.error(err);
      }
    }

    let catalogLoaded = false;

    async function loadCatalog() {
      const el = document.getElementById('catalog-results');
      el.innerHTML = `<div style="text-align:center; padding:2rem; color:#94a3b8; font-size:14px;">전체 상품을 불러오는 중...</div>`;

      try {
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const products = (await res.json()).filter(p => p.available);
        const cards = products.map(renderProductCard).join('');
        el.innerHTML = `
          <div style="font-size:13px; color:#64748b; margin-bottom:10px; padding-left:2px;">
            현재 판매 중인 상품 <strong style="color:#1e293b;">${products.length}개</strong>
          </div>
          ${cards}
        `;
        catalogLoaded = true;
      } catch (err) {
        el.innerHTML = `
          <div style="background:#fff; border-radius:16px; border:1px solid #FCA5A5; padding:1.5rem; text-align:center; color:#B91C1C; font-size:14px;">
            상품 목록을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.
          </div>`;
        console.error(err);
      }
    }

    document.getElementById('view-tabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.tab-btn');
      if (!tab) return;
      document.querySelectorAll('#view-tabs .tab-btn').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      const view = tab.dataset.view;
      document.getElementById('recommend-view').style.display = view === 'recommend' ? '' : 'none';
      document.getElementById('catalog-view').style.display = view === 'catalog' ? '' : 'none';

      if (view === 'catalog' && !catalogLoaded) {
        loadCatalog();
      }
    });

    recommend();
  </script>

</body>
</html>
